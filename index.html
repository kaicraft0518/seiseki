<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>成績管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- ========== ▼ここにFirebaseの設定を貼る▼ ========== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, onValue, off }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCCx7m_eZKDDAKq0hcuItfj7yjUv3X12mU",
    authDomain: "test-seiseki.firebaseapp.com",
    databaseURL: "https://test-seiseki-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "test-seiseki",
    storageBucket: "test-seiseki.firebasestorage.app",
    messagingSenderId: "971530781506",
    appId: "1:971530781506:web:ab8e9d3399b27569e77edb",
    measurementId: "G-JF7CBEQM79"
  };

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

let currentUser = null;
let dbRef = null;
let unsubscribe = null;

// ログイン
window._login = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) { console.error(e); }
};
// ログアウト
window._logout = async () => {
  if (unsubscribe) { off(dbRef); unsubscribe = null; }
  await signOut(auth);
};

// 認証状態監視
onAuthStateChanged(auth, user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display        = 'flex';
    document.getElementById('user-name').textContent    = user.displayName || user.email;
    document.getElementById('user-avatar').src          = user.photoURL || '';
    startSync(user.uid);
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display        = 'none';
    if (unsubscribe) { off(dbRef); unsubscribe = null; }
  }
});

// Firebase同期開始
function startSync(uid) {
  dbRef = ref(db, `users/${uid}/seiseki`);
  // リアルタイム受信
  onValue(dbRef, snap => {
    const data = snap.val();
    if (data) {
      if (data.maxScores) maxScores = data.maxScores;
      if (data.scores)    scores    = data.scores;
      if (data.avgScores) avgScores = data.avgScores;
      if (data.moshiData) {
        moshiData  = data.moshiData;
        moshiCount = moshiData.length
          ? Math.max(...moshiData.map(m => m.id))
          : 0;
      }
    }
    initDefaults();
    buildExamPills();
    buildTable();
    buildGraphSelect();
    renderMoshi();
    setSaveStatus('同期済み');
  }, err => { console.error(err); setSaveStatus('同期エラー'); });
}

// Firebase保存
window._saveToFirebase = () => {
  if (!currentUser || !dbRef) return;
  set(dbRef, { maxScores, scores, avgScores, moshiData })
    .then(() => setSaveStatus('保存済み ' + new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})))
    .catch(e => { console.error(e); setSaveStatus('保存失敗'); });
};

// ========== アプリ本体 ==========
const EXAMS = ['第1回','第2回','第3回','第4回'];
const SUBJECTS = [
  {name:'現代国語',  all:true,  cat:'kokugo'},
  {name:'言語文化',  all:true,  cat:'kokugo'},
  {name:'数学I',     all:true,  cat:'sugaku'},
  {name:'数学A',     all:true,  cat:'sugaku'},
  {name:'英コミュⅠ',all:true,  cat:'eigo'},
  {name:'論表Ⅰ',    all:true,  cat:'eigo'},
  {name:'英語L',     all:true,  cat:'eigo'},
  {name:'物理基礎',  all:true,  cat:'rika'},
  {name:'化学基礎',  all:true,  cat:'rika'},
  {name:'地理総合',  all:true,  cat:'shakai'},
  {name:'歴史総合',  all:true,  cat:'shakai'},
  {name:'情報',      all:false, exams:[1,3], cat:'other'},
];

let maxScores = {}, scores = {}, avgScores = {};
let moshiData = [], moshiCount = 0;
let currentExam = 0;
let autoTimer = null;
let lineChart = null, barChart = null, diffChart = null, moshiChart = null;

function hasExam(sub, i){ return sub.all || sub.exams.includes(i); }

function initDefaults(){
  SUBJECTS.forEach(s => {
    if(!maxScores[s.name]) maxScores[s.name] = {};
    if(!scores[s.name])    scores[s.name]    = {};
    if(!avgScores[s.name]) avgScores[s.name] = {};
    EXAMS.forEach((_,i) => {
      if(maxScores[s.name][i] == null) maxScores[s.name][i] = 100;
      if(scores[s.name][i]    == null) scores[s.name][i]    = '';
      if(avgScores[s.name][i] == null) avgScores[s.name][i] = '';
    });
  });
}

function setSaveStatus(msg){ document.getElementById('save-status').textContent = msg; }

function scheduleAutosave(){
  clearTimeout(autoTimer);
  setSaveStatus('未保存...');
  autoTimer = setTimeout(() => window._saveToFirebase(), 1500);
}

function calcRating(score, max){
  if(score===''||score==null||isNaN(score)) return null;
  let r = Math.round(parseFloat(score) * 0.08 + 2);
  return Math.min(10, Math.max(1, r));
}

// タブ切替
window.switchTab = name => {
  document.querySelectorAll('.tab').forEach((t,i) =>
    t.classList.toggle('active', ['teiki','graph','moshi'][i]===name));
  ['teiki','graph','moshi'].forEach(n =>
    document.getElementById('sec-'+n).classList.toggle('active', n===name));
  if(name==='graph') drawGraphs();
  if(name==='moshi') drawMoshiChart();
};

// 定期考査
window.selectExam = i => { currentExam=i; buildExamPills(); buildTable(); };

function buildExamPills(){
  document.getElementById('exam-pills').innerHTML =
    EXAMS.map((e,i) =>
      `<div class="exam-pill${i===currentExam?' active':''}" onclick="selectExam(${i})">${e}</div>`
    ).join('');
}

function buildTable(){
  const i = currentExam;
  document.getElementById('thead').innerHTML = `<tr>
    <th style="min-width:130px;text-align:left">科目</th>
    <th>満点</th><th>平均点</th><th>自分</th>
    <th>差</th><th>得点率</th><th>評定</th><th>学年順位</th>
  </tr>`;

  let b='', totalScore=0, totalMax=0, totalAvg=0;
  let hasSc=false, hasAv=false;

  SUBJECTS.forEach(sub => {
    if(!hasExam(sub,i)){
      b+=`<tr><td class="sub ${sub.cat}" style="color:var(--text3)">${sub.name}</td>
          <td class="na" colspan="7">この考査は実施なし</td></tr>`; return;
    }
    const mx  = maxScores[sub.name][i]||100;
    const sc  = scores[sub.name][i];
    const av  = avgScores[sub.name][i];
    const rnk = scores[sub.name]['rank_'+i]||'';
    const tot = scores[sub.name]['rtotal_'+i]||'';
    const r   = calcRating(sc, mx);
    const rc  = r?'r'+r:'';
    let diff='', diffClass='';
    if(sc!==''&&sc!=null&&av!==''&&av!=null&&!isNaN(sc)&&!isNaN(av)){
      const d = parseFloat(sc)-parseFloat(av);
      diff = (d>=0?'+':'')+d.toFixed(1);
      diffClass = d>=0?'diff-pos':'diff-neg';
    }
    totalMax += mx;
    if(sc!==''&&sc!=null&&!isNaN(sc)){ totalScore+=parseFloat(sc); hasSc=true; }
    if(av!==''&&av!=null&&!isNaN(av)){ totalAvg  +=parseFloat(av); hasAv=true; }
    b+=`<tr>
      <td class="sub ${sub.cat}">${sub.name}</td>
      <td><input type="number" min="1" max="999" value="${mx}" oninput="onMax('${sub.name}',${i},this.value)"></td>
      <td><input type="number" min="0" max="${mx}" value="${av}" placeholder="—" oninput="onAvg('${sub.name}',${i},this.value)"></td>
      <td class="score-cell"><input type="number" min="0" max="${mx}" value="${sc}" placeholder="—" oninput="onScore('${sub.name}',${i},this.value)"></td>
      <td class="${diffClass}">${diff||'—'}</td>
      <td>${sc!==''&&sc!=null&&!isNaN(sc)?Math.round(parseFloat(sc)/mx*1000)/10+'%':'—'}</td>
      <td class="${rc}">${r||'—'}</td>
      <td><input type="number" min="1" value="${rnk}" placeholder="—" style="width:36px" oninput="onRank('${sub.name}',${i},'rank',this.value)">
          <span style="color:var(--text3);font-size:11px">/</span>
          <input type="number" min="1" value="${tot}" placeholder="全体" style="width:42px" oninput="onRank('${sub.name}',${i},'rtotal',this.value)"></td>
    </tr>`;
  });
  const td=hasSc&&hasAv?totalScore-totalAvg:null;
  b+=`<tr style="background:var(--surface2);font-weight:700">
    <td class="sub" style="font-weight:700">合計</td>
    <td>${totalMax}</td>
    <td>${hasAv?totalAvg:'—'}</td>
    <td>${hasSc?totalScore:'—'}</td>
    <td class="${td==null?'':td>=0?'diff-pos':'diff-neg'}">${td!=null?(td>=0?'+':'')+td:'—'}</td>
    <td>${hasSc?Math.round(totalScore/totalMax*1000)/10+'%':'—'}</td>
    <td colspan="2">—</td>
  </tr>`;
  document.getElementById('tbody').innerHTML = b;
  buildSummary();
}

function buildSummary(){
  const i=currentExam;
  let total=0,cnt=0,maxR=0,diffTotal=0,diffCnt=0;
  SUBJECTS.forEach(sub=>{
    if(!hasExam(sub,i)) return;
    const r=calcRating(scores[sub.name][i],maxScores[sub.name][i]);
    if(r!=null){total+=r;cnt++;if(r>maxR)maxR=r;}
    const sc=scores[sub.name][i],av=avgScores[sub.name][i];
    if(sc!==''&&sc!=null&&av!==''&&av!=null&&!isNaN(sc)&&!isNaN(av)){diffTotal+=parseFloat(sc)-parseFloat(av);diffCnt++;}
  });
  const avg=cnt?(total/cnt).toFixed(1):'—';
  const dc=diffCnt&&diffTotal>=0?'#0d5e3f':'#9b2424';
  document.getElementById('summary').innerHTML=`
    <div class="metric"><div class="metric-label">平均評定</div><div class="metric-value">${avg}</div></div>
    <div class="metric"><div class="metric-label">最高評定</div><div class="metric-value">${cnt?maxR:'—'}</div></div>
    <div class="metric"><div class="metric-label">平均との差（avg）</div>
      <div class="metric-value" style="color:${dc};font-size:18px">${diffCnt&&diffTotal>=0?'+':''}${diffCnt?(diffTotal/diffCnt).toFixed(1):'—'}</div></div>`;
}

window.onMax   = (n,i,v)=>{ const x=parseFloat(v); if(!isNaN(x)&&x>=1){maxScores[n][i]=Math.round(x);buildTable();scheduleAutosave();} };
window.onAvg   = (n,i,v)=>{ avgScores[n][i]=v===''?'':parseFloat(v); buildTable(); scheduleAutosave();
  if(document.getElementById('sec-graph').classList.contains('active')) drawGraphs(); };
window.onScore = (n,i,v)=>{ scores[n][i]=v===''?'':parseFloat(v); buildTable(); scheduleAutosave();
  if(document.getElementById('sec-graph').classList.contains('active')) drawGraphs(); };
window.onRank  = (n,i,k,v)=>{ scores[n][k+'_'+i]=v===''?'':parseInt(v); scheduleAutosave(); };

// グラフ
function buildGraphSelect(){
  document.getElementById('graph-sel').innerHTML =
    SUBJECTS.map(s=>`<option value="${s.name}">${s.name}</option>`).join('');
}

window.drawGraphs = () => {
  const name = document.getElementById('graph-sel').value;
  const sub  = SUBJECTS.find(s=>s.name===name);
  const labels=[],ratings=[],rates=[],diffs=[];
  EXAMS.forEach((e,i)=>{
    if(!hasExam(sub,i)) return;
    labels.push(e);
    const sc=scores[sub.name][i], mx=maxScores[sub.name][i], av=avgScores[sub.name][i];
    ratings.push(calcRating(sc,mx));
    rates.push(sc!==''&&sc!=null?Math.round(parseFloat(sc)/mx*100):null);
    diffs.push(sc!==''&&sc!=null&&av!==''&&av!=null?Math.round((parseFloat(sc)-parseFloat(av))*10)/10:null);
  });
  if(lineChart) lineChart.destroy();
  if(barChart)  barChart.destroy();
  if(diffChart) diffChart.destroy();
  const gc='rgba(0,0,0,0.06)';
  lineChart=new Chart(document.getElementById('lineChart'),{type:'line',data:{labels,datasets:[{data:ratings,borderColor:'#4a3fd4',backgroundColor:'rgba(74,63,212,0.07)',borderWidth:2,tension:0.35,fill:true,spanGaps:false,pointRadius:5,pointBackgroundColor:'#4a3fd4'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:10,ticks:{stepSize:1},grid:{color:gc}},x:{grid:{display:false}}}}});
  barChart=new Chart(document.getElementById('barChart'),{type:'bar',data:{labels,datasets:[{data:rates,backgroundColor:'rgba(74,63,212,0.18)',borderColor:'#4a3fd4',borderWidth:1.5,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'},grid:{color:gc}},x:{grid:{display:false}}}}});
  const dc=diffs.map(d=>d==null?'transparent':d>=0?'rgba(29,158,117,0.7)':'rgba(216,90,48,0.7)');
  diffChart=new Chart(document.getElementById('diffChart'),{type:'bar',data:{labels,datasets:[{data:diffs,backgroundColor:dc,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:gc},ticks:{callback:v=>(v>=0?'+':'')+v}},x:{grid:{display:false}}}}});
};

// 模試
window.addMoshi = () => {
  moshiCount++;
  moshiData.push({id:moshiCount,name:`模試${moshiCount}`,
    kokugo:{score:'',rank:'',total:''},
    sugaku:{score:'',rank:'',total:''},
    eigo:  {score:'',rank:'',total:''}
  });
  renderMoshi(); scheduleAutosave();
};
window.deleteMoshi = id => {
  if(!confirm('削除しますか？')) return;
  moshiData=moshiData.filter(m=>m.id!==id);
  renderMoshi(); scheduleAutosave();
};
window.updateMoshi = (id,sub,key,val) => {
  const m=moshiData.find(x=>x.id===id);
  if(m){ m[sub][key]=val; drawMoshiChart(); scheduleAutosave(); }
};
window.updateMoshiName = (id,val) => {
  const m=moshiData.find(x=>x.id===id);
  if(m){ m.name=val; drawMoshiChart(); scheduleAutosave(); }
};

function renderMoshi(){
  const area=document.getElementById('moshi-list');
  if(!moshiData.length){
    area.innerHTML='<div class="empty-state">「追加」ボタンで模試を記録できます。</div>';
    drawMoshiChart(); return;
  }
  area.innerHTML=moshiData.map(m=>`
    <div class="moshi-card">
      <div class="moshi-name-row">
        <input class="moshi-name-input" value="${m.name}" oninput="updateMoshiName(${m.id},this.value)">
        <button class="btn btn-danger" onclick="deleteMoshi(${m.id})">削除</button>
      </div>
      <div class="moshi-subjects">
        ${[['kokugo','国語'],['sugaku','数学'],['eigo','英語']].map(([sub,label])=>`
          <div class="moshi-subj">
            <div class="moshi-subj-label">${label}</div>
            <div class="field-label">点数</div>
            <input type="number" class="field-input" value="${m[sub].score}" placeholder="—" oninput="updateMoshi(${m.id},'${sub}','score',this.value)">
            <div class="field-label">順位</div>
            <div class="rank-row">
              <input type="number" class="field-input" value="${m[sub].rank}" placeholder="—" style="width:48%" oninput="updateMoshi(${m.id},'${sub}','rank',this.value)">
              <span class="rank-sep">/</span>
              <input type="number" class="field-input" value="${m[sub].total}" placeholder="全体" style="width:48%" oninput="updateMoshi(${m.id},'${sub}','total',this.value)">
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
  drawMoshiChart();
}

function drawMoshiChart(){
  if(moshiChart) moshiChart.destroy();
  if(!moshiData.length) return;
  const labels=moshiData.map(m=>m.name);
  const mk=sub=>moshiData.map(m=>m[sub].score===''?null:parseFloat(m[sub].score));
  moshiChart=new Chart(document.getElementById('moshiChart'),{
    type:'line',
    data:{labels,datasets:[
      {label:'国語',data:mk('kokugo'),borderColor:'#D85A30',backgroundColor:'transparent',pointBackgroundColor:'#D85A30',borderWidth:2.5,tension:0.3,spanGaps:false,pointRadius:5},
      {label:'数学',data:mk('sugaku'),borderColor:'#4a3fd4',backgroundColor:'transparent',pointBackgroundColor:'#4a3fd4',borderWidth:2.5,tension:0.3,spanGaps:false,pointRadius:5,borderDash:[5,4]},
      {label:'英語',data:mk('eigo'),  borderColor:'#1D9E75',backgroundColor:'transparent',pointBackgroundColor:'#1D9E75',borderWidth:2.5,tension:0.3,spanGaps:false,pointRadius:5,borderDash:[2,3]},
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,grid:{color:'rgba(0,0,0,0.06)'}},x:{grid:{display:false}}}}
  });
}
</script>
<!-- ========== ▲Firebase設定ここまで▲ ========== -->

<style>
:root {
  --bg:#f7f6f3; --surface:#fff; --surface2:#f0efe9;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.15);
  --text:#1a1a1a; --text2:#666; --text3:#999;
  --accent:#4a3fd4; --accent-light:#eeedfb;
  --r1:#fde8e8; --r1t:#9b2424;
  --r4:#fef3de; --r4t:#7a4a08;
  --r6:#e8f5df; --r6t:#2e5e0e;
  --r8:#ddf4ec; --r8t:#0d5e3f;
  --r10:#eeedfb; --r10t:#3029a0;
  --radius:10px; --radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

/* ログイン画面 */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100vh;gap:20px;background:var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  padding:40px 32px;text-align:center;max-width:320px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.login-card h1{font-size:20px;font-weight:700;margin-bottom:8px}
.login-card p{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6}
.btn-google{display:flex;align-items:center;gap:12px;padding:12px 20px;
  border:1.5px solid var(--border2);border-radius:8px;background:var(--surface);
  color:var(--text);font-size:14px;font-weight:600;cursor:pointer;width:100%;justify-content:center}
.btn-google:active{opacity:0.7}
.btn-google svg{flex-shrink:0}

/* アプリ */
.app{display:none;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;flex:1}
.user-info{display:flex;align-items:center;gap:7px}
#user-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid var(--border2)}
#user-name{font-size:12px;color:var(--text2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.save-status{font-size:11px;color:var(--text3)}
.btn{padding:5px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);
  background:var(--surface);color:var(--text);font-size:12px;cursor:pointer;white-space:nowrap}
.btn:active{opacity:0.7}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-danger{color:#c0392b;border-color:#e9b0af}

.tabs{display:flex;padding:0 14px;background:var(--surface);
  border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{padding:10px 18px;font-size:13px;color:var(--text2);
  border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.section{display:none}
.section.active{display:block}

.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.metric-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.metric-value{font-size:22px;font-weight:700;color:var(--accent)}

.exam-pills{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.exam-pill{padding:7px 18px;font-size:13px;font-weight:500;border:1.5px solid var(--border2);
  border-radius:99px;background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap}
.exam-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
table{border-collapse:collapse;white-space:nowrap;width:100%}
th,td{padding:8px 9px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-size:12px;text-align:center}
th:last-child,td:last-child{border-right:none}
tr:last-child td{border-bottom:none}
th{background:var(--surface2);color:var(--text2);font-weight:600}
td.sub{text-align:left;font-weight:600;font-size:12px;min-width:130px;max-width:130px;white-space:normal;word-break:break-all;line-height:1.4}
td.sub.kokugo{background:#fde8e8;color:#8b1a1a}
td.sub.sugaku{background:#ddf4fb;color:#0a5a7a}
td.sub.eigo{background:#fde8f4;color:#8b1a5a}
td.sub.rika{background:#e8f5df;color:#2e5e0e}
td.sub.shakai{background:#f3ead8;color:#6b4210}
td.sub.other{background:var(--surface2);color:var(--text)}
td.na{background:#f5f5f3;color:var(--text3)}
td.score-cell{background:#fde8e8}
td input[type=number]{width:56px;border:none;background:transparent;text-align:center;
  font-size:12px;color:var(--text);outline:none;font-family:inherit;-moz-appearance:textfield}
td input[type=number]::-webkit-inner-spin-button,
td input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
td input[type=number]:focus{background:var(--accent-light);border-radius:4px}
td.score-cell input{color:#8b1a1a;font-weight:600}
td.r1,td.r2,td.r3{background:var(--r1);color:var(--r1t);font-weight:600}
td.r4,td.r5{background:var(--r4);color:var(--r4t);font-weight:600}
td.r6,td.r7{background:var(--r6);color:var(--r6t);font-weight:600}
td.r8,td.r9{background:var(--r8);color:var(--r8t);font-weight:600}
td.r10{background:var(--r10);color:var(--r10t);font-weight:700}
td.diff-pos{color:#0d5e3f;font-size:12px;font-weight:600}
td.diff-neg{color:#9b2424;font-size:12px;font-weight:600}
.note{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.6}

.graph-ctrl{display:flex;align-items:center;gap:12px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px;flex-wrap:wrap}
.graph-ctrl label{font-size:12px;color:var(--text2)}
.graph-ctrl select{font-size:13px;padding:5px 8px;border:1px solid var(--border2);
  border-radius:var(--radius-sm);background:var(--surface);color:var(--text)}
.chart-block{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;margin-bottom:14px}
.chart-block-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px}
.chart-wrap{position:relative;width:100%;height:220px}

.moshi-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.moshi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.moshi-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.moshi-name-input{font-size:14px;font-weight:600;border:none;background:transparent;
  color:var(--text);border-bottom:1px solid var(--border2);width:120px;font-family:inherit;outline:none}
.moshi-subjects{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.moshi-subj-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;
  padding-bottom:4px;border-bottom:2px solid var(--border)}
.field-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.field-input{width:100%;border:1px solid var(--border);border-radius:5px;padding:5px 7px;
  font-size:12px;background:var(--bg);color:var(--text);font-family:inherit;margin-bottom:6px;-moz-appearance:textfield}
.field-input::-webkit-inner-spin-button{-webkit-appearance:none}
.field-input:focus{outline:none;border-color:var(--accent);background:var(--accent-light)}
.rank-row{display:flex;align-items:center;gap:4px}
.rank-row .field-input{margin-bottom:0}
.rank-sep{font-size:11px;color:var(--text3)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <h1>📊 成績管理</h1>
    <p>Googleアカウントでログインすると、データがクラウドに保存されます。</p>
    <button class="btn-google" onclick="_login()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Googleでログイン
    </button>
  </div>
</div>

<!-- メインアプリ -->
<div class="app" id="app">
  <div class="topbar">
    <h1>📊 成績管理</h1>
    <span class="save-status" id="save-status">読み込み中...</span>
    <div class="user-info">
      <img id="user-avatar" src="" alt="">
      <span id="user-name"></span>
    </div>
    <button class="btn" onclick="_logout()">ログアウト</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('teiki')">定期考査</div>
    <div class="tab" onclick="switchTab('graph')">推移グラフ</div>
    <div class="tab" onclick="switchTab('moshi')">模試</div>
  </div>

  <div class="content">

    <div id="sec-teiki" class="section active">
      <div class="summary" id="summary"></div>
      <div class="exam-pills" id="exam-pills"></div>
      <div class="table-wrap">
        <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
      </div>
      <p class="note">※ 評定は得点×0.08+2（切り捨て後1〜10に補正）。差 = 自分の点数 − 平均点。</p>
    </div>

    <div id="sec-graph" class="section">
      <div class="graph-ctrl">
        <label>科目：</label>
        <select id="graph-sel" onchange="drawGraphs()"></select>
      </div>
      <div class="chart-block">
        <div class="chart-block-title">評定の推移（10段階）</div>
        <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
      </div>
      <div class="chart-block">
        <div class="chart-block-title">得点率の推移（%）</div>
        <div class="chart-wrap"><canvas id="barChart"></canvas></div>
      </div>
      <div class="chart-block">
        <div class="chart-block-title">平均点との差の推移</div>
        <div class="chart-wrap"><canvas id="diffChart"></canvas></div>
      </div>
    </div>

    <div id="sec-moshi" class="section">
      <div class="moshi-header">
        <span style="font-size:15px;font-weight:600">模試記録</span>
        <button class="btn btn-primary" onclick="addMoshi()">＋ 追加</button>
      </div>
      <div id="moshi-list"></div>
      <div class="chart-block" style="margin-top:16px">
        <div class="chart-block-title">点数推移</div>
        <div style="display:flex;gap:16px;font-size:11px;color:var(--text2);margin-bottom:8px">
          <span><span style="display:inline-block;width:10px;height:10px;background:#D85A30;border-radius:2px;margin-right:4px"></span>国語</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#4a3fd4;border-radius:2px;margin-right:4px"></span>数学</span>
          <span><span style="display:inline-block;width:10px;height:10px;background:#1D9E75;border-radius:2px;margin-right:4px"></span>英語</span>
        </div>
        <div class="chart-wrap"><canvas id="moshiChart"></canvas></div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
