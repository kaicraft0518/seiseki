function gd(){ return gradeData[currentGrade]; }

function initGradeDefaults(g){
  const d = gradeData[g];
  if(!d.maxScores)  d.maxScores  = {};
  if(!d.scores)     d.scores     = {};
  if(!d.avgScores)  d.avgScores  = {};
  if(!d.goalScores) d.goalScores = {};
  if(!d.ratings)    d.ratings    = {};
  if(!d.topScores)  d.topScores  = {};
  if(!d.totalRanks) d.totalRanks = {};
  if(!d.moshiData)  d.moshiData  = [];
  if(d.moshiCount == null) d.moshiCount = 0;
  SUBJECTS.forEach(s => {
    ['maxScores','scores','avgScores','goalScores','topScores','ratings'].forEach(k => {
      if(!d[k][s.name]) d[k][s.name] = {};
    });
    EXAMS.forEach((_,i) => {
      if(d.maxScores[s.name][i]  == null) d.maxScores[s.name][i]  = 100;
      if(d.scores[s.name][i]     == null) d.scores[s.name][i]     = '';
      if(d.avgScores[s.name][i]  == null) d.avgScores[s.name][i]  = '';
      if(d.goalScores[s.name][i] == null) d.goalScores[s.name][i] = '';
      if(d.topScores[s.name][i]  == null) d.topScores[s.name][i]  = '';
      if(d.ratings[s.name][i]    == null) d.ratings[s.name][i]    = '';
    });
  });
  EXAMS.forEach((_,i) => {
    if(!d.totalRanks[i]) d.totalRanks[i] = {rating:'',rank:'',rtotal:''};
  });
}

async function startSync(uid){
  const RESTORE_UID = 'R8TSKHZPaaXCI4UCFfnfyDad0HT2';
  const RESTORE_DATA = {
    avgScores: {"化学基礎":[55,"","",""],"地理総合":[57,"","",""],"情報":["","","",""],"数学A":[53.6,"","",""],"数学I":[58,"","",""],"歴史総合":[55,"","",""],"現代国語":[68,"","",""],"科学と人間生活":[31.2,"","",""],"英コミュⅠ":[55.6,"","",""],"英語L":[16.2,"","",""],"言語文化":[68,"","",""],"論表Ⅰ":[60.9,"","",""]},
    maxScores: {"化学基礎":[100,100,100,100],"地理総合":[100,100,100,100],"情報":[100,100,100,100],"数学A":[106,100,100,100],"数学I":[108,100,100,100],"歴史総行":[100,100,100,100],"現代国語":[100,100,100,100],"科学と人間生活":[100,100,100,100],"英コミュⅠ":[100,100,100,100],"英語L":[20,100,100,100],"言語文化":[110,100,100,100],"論表Ⅰ":[100,100,100,100]},
    scores:    {"化学基礎":[61,"","",""],"地理総合":[83,"","",""],"情報":["","","",""],"数学A":[89,"","",""],"数学I":[91,"","",""],"歴史総合":[73,"","",""],"現代国語":[83,"","",""],"科学と人間生活":[48,"","",""],"英コミュⅠ":[67,"","",""],"英語L":[19,"","",""],"言語文化":[71,"","",""],"論表Ⅰ":[71,"","",""]},
    totalRanks:[{rank:"",rating:"",rtotal:""},{rank:"",rating:"",rtotal:""},{rank:"",rating:"",rtotal:""},{rank:"",rating:"",rtotal:""}],
    moshiData: [{eigo:{rank:"",score:"",total:""},id:1,kokugo:{rank:"",score:"",total:""},name:"進研模試 7月",sugaku:{rank:"",score:"",total:""}}]
  };

  const snap = await get(ref(db, `users/${uid}/seiseki`));
  const raw  = snap.exists() ? snap.val() : null;

  const needsRestore = uid === RESTORE_UID &&
    !(raw && raw.grades && raw.grades[0] && raw.grades[0].scores &&
      Object.values(raw.grades[0].scores).some(arr => arr.some(v => v !== '' && v != null)));

  if(needsRestore){
    const r = RESTORE_DATA;
    gradeData[0].maxScores  = r.maxScores;
    gradeData[0].scores     = r.scores;
    gradeData[0].avgScores  = r.avgScores;
    gradeData[0].totalRanks = r.totalRanks;
    gradeData[0].moshiData  = r.moshiData;
    gradeData[0].moshiCount = 1;
    GRADES.forEach((_,g) => initGradeDefaults(g));
    await set(ref(db, `users/${uid}/seiseki`), { grades: gradeData });
    setSaveStatus('データを復元しました');
  } else if(raw && raw.grades){
    GRADES.forEach((_,g) => { if(raw.grades[g]) gradeData[g] = raw.grades[g]; });
  } else if(raw && !raw.grades){
    if(raw.maxScores)  gradeData[0].maxScores  = raw.maxScores;
    if(raw.scores)     gradeData[0].scores      = raw.scores;
    if(raw.avgScores)  gradeData[0].avgScores   = raw.avgScores;
    if(raw.totalRanks) gradeData[0].totalRanks  = raw.totalRanks;
    if(raw.moshiData){ gradeData[0].moshiData=raw.moshiData; gradeData[0].moshiCount=raw.moshiData.length?Math.max(...raw.moshiData.map(m=>m.id)):0; }
    GRADES.forEach((_,g) => initGradeDefaults(g));
    await set(ref(db, `users/${uid}/seiseki`), { grades: gradeData });
    setSaveStatus('移行完了');
  }

  GRADES.forEach((_,g) => initGradeDefaults(g));
  buildUI(); setSaveStatus('同期済み');

  dbRef = ref(db, `users/${uid}/seiseki`);
  onValue(dbRef, snap => {
    const data = snap.val();
    if(data && data.grades) GRADES.forEach((_,g) => { if(data.grades[g]) gradeData[g]=data.grades[g]; });
    GRADES.forEach((_,g) => initGradeDefaults(g));
    buildUI(); setSaveStatus('同期済み');
  }, err => { console.error(err); setSaveStatus('同期エラー'); });
}

window._saveToFirebase = () => {
  if(!currentUser || !dbRef) return;
  set(ref(db, `users/${currentUser.uid}/seiseki`), { grades: gradeData })
    .then(() => setSaveStatus('保存済み '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})))
    .catch(e => { console.error(e); setSaveStatus('保存失敗'); });
};
function setSaveStatus(msg){ document.getElementById('save-status').textContent = msg; }
function scheduleAutosave(){ clearTimeout(autoTimer); setSaveStatus('未保存...'); autoTimer=setTimeout(()=>window._saveToFirebase(),1500); }

// ===== ユーティリティ =====
function fmtN(v){ return (Math.round(v*10)/10).toFixed(1); }
function hasExam(sub,i){ return sub.all||(sub.exams&&sub.exams.includes(i)); }
function sKey(sub){ return sub.key || sub.name; }
function calcRating(score,max){
  if(score===''||score==null||isNaN(score)||!max) return null;
  return Math.min(10,Math.max(1,Math.round(parseFloat(score)/max*9+1)));
}

// ===== テーブル =====
function buildTable(){
  const d=gd(), ei=currentExam;
  // ヘッダー
  let hCols = `<th style="min-width:100px;text-align:left;position:sticky;left:0;z-index:2;background:var(--surface2)">科目</th>
    <th>満点</th><th>目標</th><th>平均点</th>`;
  if(showTopScore) hCols += `<th>最高点</th>`;
  hCols += `<th>自分</th><th>差</th><th>目標差</th><th>得点率</th><th>評定</th>`;
  document.getElementById('thead').innerHTML = `<tr>${hCols}</tr>`;

  let b='';
  SUBJECTS.forEach(sub=>{
    const rid=rowId(sub.name);
    if(!hasExam(sub,ei)){
      const span = showTopScore ? 9 : 8;
      b+=`<tr id="${rid}"><td class="sub ${sub.cat} sticky-col" style="color:var(--text3)">${sub.name}</td>
          <td class="na" colspan="${span}">この考査は実施なし</td></tr>`;
      return;
    }
    const mx  = d.maxScores[sub.name][ei]||100;
    const sc  = d.scores[sub.name][ei];
    const av  = d.avgScores[sub.name][ei];
    const gl  = d.goalScores[sub.name][ei];
    const tp  = d.topScores[sub.name][ei];
    const rt  = d.ratings&&d.ratings[sub.name]&&d.ratings[sub.name][ei]!=null ? d.ratings[sub.name][ei] : '';
    const {diff,diffClass,rate} = calcCells(sc,av,mx);
    const rc  = rt!==''&&rt!=null ? 'r'+Math.min(10,Math.max(1,parseInt(rt))) : '';
    let gdiff='—',gdiffClass='';
    if(sc!==''&&sc!=null&&gl!==''&&gl!=null&&!isNaN(sc)&&!isNaN(gl)){
      const gv=Math.round((parseFloat(sc)-parseFloat(gl))*10)/10;
      gdiff=(gv>=0?'+':'')+fmtN(gv); gdiffClass=gv>=0?'diff-pos':'diff-neg';
    }
    let topCell = showTopScore ? `<td class="top-cell"><input type="number" min="0" max="${mx}" value="${tp!==''?tp:''}" placeholder="—" oninput="onTop('${sub.name}',${ei},this.value)"></td>` : '';
    b+=`<tr id="${rid}">
      <td class="sub ${sub.cat} sticky-col">${sub.name}</td>
      <td><input type="number" min="1" max="999" value="${mx}" onchange="onMax('${sub.name}',${ei},this.value)"></td>
      <td class="goal-cell"><input type="number" min="0" value="${gl!==''?gl:''}" placeholder="—" oninput="onGoal('${sub.name}',${ei},this.value)"></td>
      <td><input type="number" min="0" value="${av!==''?av:''}" placeholder="—" oninput="onAvg('${sub.name}',${ei},this.value)"></td>
      ${topCell}
      <td class="score-cell"><input type="number" min="0" max="${mx}" value="${sc!==''?sc:''}" placeholder="—" oninput="onScore('${sub.name}',${ei},this.value)"></td>
      <td class="cell-diff ${diffClass}" id="${rid}-diff">${diff}</td>
      <td class="${gdiffClass}" id="${rid}-gdiff">${gdiff}</td>
      <td class="cell-rate" id="${rid}-rate">${rate}</td>
      <td class="${rc}" id="${rid}-r"><input type="number" min="1" max="10" value="${rt}" placeholder="—" style="width:32px;font-weight:700" oninput="onRating('${sub.name}',${ei},this.value)"></td>
    </tr>`;
  });
  // 合計行
  const tr=d.totalRanks[ei]||{};
  const trc=tr.rating?'r'+Math.min(10,Math.max(1,parseInt(tr.rating))):'';
  const topTotalCell = showTopScore ? `<td id="total-top">—</td>` : '';
  b+=`<tr id="row-total" style="background:var(--surface2);font-weight:700">
    <td class="sub sticky-col" style="font-weight:700;background:var(--surface2)">合計</td>
    <td id="total-max">—</td>
    <td id="total-goal">—</td>
    <td id="total-avg">—</td>
    ${topTotalCell}
    <td id="total-sc">—</td>
    <td id="total-diff">—</td>
    <td id="total-gdiff">—</td>
    <td id="total-rate">—</td>
    <td class="${trc}" id="total-r-cell">
      <input type="number" min="1" max="10" value="${tr.rating||''}" placeholder="—" style="width:32px;font-weight:700" onchange="onTotalRating(${ei},this.value)">
    </td>
  </tr>`;
  document.getElementById('tbody').innerHTML=b;
  updateTotals(); buildSummary();
}

function calcCells(sc,av,mx){
  let diff='—',diffClass='',rate='—';
  if(sc!==''&&sc!=null&&!isNaN(sc)) rate=fmtN(parseFloat(sc)/mx*100)+'%';
  if(sc!==''&&sc!=null&&av!==''&&av!=null&&!isNaN(sc)&&!isNaN(av)){
    const dv=Math.round((parseFloat(sc)-parseFloat(av))*10)/10;
    diff=(dv>=0?'+':'')+fmtN(dv); diffClass=dv>=0?'diff-pos':'diff-neg';
  }
  return {diff,diffClass,rate};
}

function updateRow(subName){
  const d=gd(),ei=currentExam,sub=SUBJECTS.find(s=>s.name===subName);
  if(!sub||!hasExam(sub,ei)) return;
  const rid=rowId(subName);
  const mx=d.maxScores[subName][ei]||100;
  const sc=d.scores[subName][ei],av=d.avgScores[subName][ei],gl=d.goalScores[subName][ei];
  const {diff,diffClass,rate}=calcCells(sc,av,mx);
  let gdiff='—',gdiffClass='';
  if(sc!==''&&sc!=null&&gl!==''&&gl!=null&&!isNaN(sc)&&!isNaN(gl)){
    const gv=Math.round((parseFloat(sc)-parseFloat(gl))*10)/10;
    gdiff=(gv>=0?'+':'')+fmtN(gv); gdiffClass=gv>=0?'diff-pos':'diff-neg';
  }
  const upd=(id,txt,cls)=>{const el=document.getElementById(id);if(el){el.textContent=txt;if(cls!=null)el.className=cls;}};
  upd(rid+'-diff',diff,'cell-diff '+diffClass);
  upd(rid+'-gdiff',gdiff,gdiffClass);
  upd(rid+'-rate',rate,null);
  updateTotals(); buildSummary();
}

function updateTotals(){
  const d=gd(),ei=currentExam;
  let tMax=0,tSc=0,tAv=0,tGl=0,tTp=0,hasSc=false,hasAv=false,hasGl=false,hasTp=false;
  SUBJECTS.forEach(sub=>{
    if(!hasExam(sub,ei)) return;
    const mx=d.maxScores[sub.name][ei]||100;
    const sc=d.scores[sub.name][ei],av=d.avgScores[sub.name][ei];
    const gl=d.goalScores[sub.name][ei],tp=d.topScores[sub.name][ei];
    tMax+=mx;
    if(sc!==''&&sc!=null&&!isNaN(sc)){tSc+=parseFloat(sc);hasSc=true;}
    if(av!==''&&av!=null&&!isNaN(av)){tAv+=parseFloat(av);hasAv=true;}
    if(gl!==''&&gl!=null&&!isNaN(gl)){tGl+=parseFloat(gl);hasGl=true;}
    if(tp!==''&&tp!=null&&!isNaN(tp)){tTp+=parseFloat(tp);hasTp=true;}
  });
  const s=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v;};
  s('total-max', tMax);
  s('total-avg', hasAv?fmtN(tAv):'—');
  s('total-sc',  hasSc?fmtN(tSc):'—');
  s('total-goal',hasGl?fmtN(tGl):'—');
  s('total-rate',hasSc?fmtN(tSc/tMax*100)+'%':'—');
  if(showTopScore) s('total-top', hasTp?fmtN(tTp):'—');
  const diff=hasSc&&hasAv?Math.round((tSc-tAv)*10)/10:null;
  const gdif=hasSc&&hasGl?Math.round((tSc-tGl)*10)/10:null;
  const dEl=document.getElementById('total-diff'),gEl=document.getElementById('total-gdiff');
  if(dEl){dEl.textContent=diff!=null?(diff>=0?'+':'')+fmtN(diff):'—';dEl.className=diff==null?'':diff>=0?'diff-pos':'diff-neg';}
  if(gEl){gEl.textContent=gdif!=null?(gdif>=0?'+':'')+fmtN(gdif):'—';gEl.className=gdif==null?'':gdif>=0?'diff-pos':'diff-neg';}
}

function buildSummary(){
  const d=gd(),ei=currentExam;
  let total=0,cnt=0,maxR=0,diffTotal=0,diffCnt=0;
  const tr=d.totalRanks[ei]||{};
  SUBJECTS.forEach(sub=>{
    if(!hasExam(sub,ei)) return;
    const r=d.ratings&&d.ratings[sub.name]&&d.ratings[sub.name][ei]!==''?parseInt(d.ratings[sub.name][ei]):null;
    if(r!=null&&!isNaN(r)){total+=r;cnt++;if(r>maxR)maxR=r;}
    const sc=d.scores[sub.name][ei],av=d.avgScores[sub.name][ei];
    if(sc!==''&&sc!=null&&av!==''&&av!=null&&!isNaN(sc)&&!isNaN(av)){diffTotal+=parseFloat(sc)-parseFloat(av);diffCnt++;}
  });
  const avg=cnt?(total/cnt).toFixed(1):'—';
  const dc=diffCnt&&diffTotal>=0?'#0d5e3f':'#9b2424';
  document.getElementById('summary').innerHTML=`
    <div class="metric"><div class="metric-label">科目平均評定</div><div class="metric-value">${avg}</div></div>
    <div class="metric"><div class="metric-label">合計評定</div><div class="metric-value">${tr.rating||'—'}</div></div>
    <div class="metric"><div class="metric-label">平均との差(avg)</div>
      <div class="metric-value" style="color:${dc};font-size:18px">${diffCnt&&diffTotal>=0?'+':''}${diffCnt?fmtN(diffTotal/diffCnt):'—'}</div></div>`;
}

// ===== 入力ハンドラ =====
window.onMax  =(n,i,v)=>{const x=parseFloat(v);if(!isNaN(x)&&x>=1){gd().maxScores[n][i]=Math.round(x);buildTable();scheduleAutosave();}};
window.onAvg  =(n,i,v)=>{gd().avgScores[n][i]=v===''?'':parseFloat(v);updateRow(n);scheduleAutosave();};
window.onScore=(n,i,v)=>{gd().scores[n][i]=v===''?'':parseFloat(v);updateRow(n);scheduleAutosave();};
window.onGoal =(n,i,v)=>{gd().goalScores[n][i]=v===''?'':parseFloat(v);updateRow(n);scheduleAutosave();};
window.onTop  =(n,i,v)=>{gd().topScores[n][i]=v===''?'':parseFloat(v);updateTotals();scheduleAutosave();};
window.onRating=(n,i,v)=>{
  const d=gd(); if(!d.ratings[n]) d.ratings[n]={};
  d.ratings[n][i]=v===''?'':parseInt(v);
  // セルの色を更新
  const el=document.getElementById(rowId(n)+'-r');
  if(el){ const rv=d.ratings[n][i]; el.className=rv?'r'+Math.min(10,Math.max(1,rv)):''; }
  buildSummary(); scheduleAutosave();
};
window.onTotalRating=(i,v)=>{
  const d=gd();if(!d.totalRanks[i])d.totalRanks[i]={};
  d.totalRanks[i].rating=v===''?'':parseInt(v);
  const cell=document.getElementById('total-r-cell');
  if(cell){const rv=d.totalRanks[i].rating;cell.className=rv?'r'+Math.min(10,Math.max(1,rv)):'';}
  buildSummary();scheduleAutosave();
};
window.onTotalRank=(i,k,v)=>{
  const d=gd();if(!d.totalRanks[i])d.totalRanks[i]={};
  d.totalRanks[i][k]=v===''?'':parseInt(v);scheduleAutosave();
};

// ===== 定期考査グラフ =====
window.switchGraphMode=mode=>{
  currentGraphMode=mode;
  document.querySelectorAll('.graph-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  document.getElementById('graph-sub-ctrl').style.display=mode==='sub'?'flex':'none';
  buildTeikiGraphs();
};
window.onSubjectChange=()=>{ currentSubject=document.getElementById('graph-sub-sel').value; buildTeikiGraphs(); };

function buildTeikiGraphs(){
  if(currentGraphMode==='total') drawTotalGraph(); else drawSubGraph();
}

function drawTotalGraph(){
  document.getElementById('teiki-graph-total').style.display='block';
  document.getElementById('teiki-graph-sub').style.display='none';
  const d=gd();
  const labels=[],scData=[],glData=[],avData=[];
  EXAMS.forEach((e,i)=>{
    labels.push(e);
    let tSc=0,tGl=0,tAv=0,hasSc=false,hasGl=false,hasAv=false;
    SUBJECTS.forEach(sub=>{
      if(!hasExam(sub,i)) return;
      const sc=d.scores[sub.name][i],gl=d.goalScores[sub.name][i],av=d.avgScores[sub.name][i];
      if(sc!==''&&sc!=null&&!isNaN(sc)){tSc+=parseFloat(sc);hasSc=true;}
      if(gl!==''&&gl!=null&&!isNaN(gl)){tGl+=parseFloat(gl);hasGl=true;}
      if(av!==''&&av!=null&&!isNaN(av)){tAv+=parseFloat(av);hasAv=true;}
    });
    scData.push(hasSc?Math.round(tSc*10)/10:null);
    glData.push(hasGl?Math.round(tGl*10)/10:null);
    avData.push(hasAv?Math.round(tAv*10)/10:null);
  });
  if(teikiAllChart) teikiAllChart.destroy();

  teikiAllChart=new Chart(document.getElementById('teikiAllChart'),{
    type:'line',
    data:{labels,datasets:[
      {label:'自分',    data:scData,borderColor:'#4a3fd4',backgroundColor:'rgba(74,63,212,0.07)',borderWidth:2.5,tension:0.35,fill:true,spanGaps:false,pointRadius:5,pointBackgroundColor:'#4a3fd4',yAxisID:'y'},
      {label:'目標',    data:glData,borderColor:'#1D9E75',backgroundColor:'transparent',borderWidth:2,borderDash:[6,4],tension:0.35,spanGaps:false,pointRadius:4,pointBackgroundColor:'#1D9E75',yAxisID:'y'},
      {label:'平均',    data:avData,borderColor:'#e67e22',backgroundColor:'transparent',borderWidth:2,borderDash:[3,3],tension:0.35,spanGaps:false,pointRadius:4,pointBackgroundColor:'#e67e22',yAxisID:'y'},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11},boxWidth:14,padding:8}}},
      scales:{
        y:{beginAtZero:false,position:'left',grid:{color:'rgba(0,0,0,0.06)'}},
        x:{grid:{display:false}}
      }}
  });
}

function drawSubGraph(){
  document.getElementById('teiki-graph-total').style.display='none';
  document.getElementById('teiki-graph-sub').style.display='block';
  const d=gd(),sub=SUBJECTS.find(s=>s.name===currentSubject);
  if(!sub) return;
  const labels=[],diffs=[];
  EXAMS.forEach((e,i)=>{
    if(!hasExam(sub,i)) return;
    labels.push(e);
    const sc=d.scores[sub.name][i],av=d.avgScores[sub.name][i];
    diffs.push(sc!==''&&sc!=null&&av!==''&&av!=null?Math.round((parseFloat(sc)-parseFloat(av))*10)/10:null);
  });
  if(teikiLineChart) teikiLineChart.destroy();
  if(teikiSubChart)  teikiSubChart.destroy();
  const gc='rgba(0,0,0,0.06)';
  const dc=diffs.map(v=>v==null?'transparent':v>=0?'rgba(29,158,117,0.7)':'rgba(216,90,48,0.7)');
  teikiSubChart=new Chart(document.getElementById('teikiSubChart'),{type:'bar',data:{labels,datasets:[{data:diffs,backgroundColor:dc,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:gc},ticks:{callback:v=>(v>=0?'+':'')+v}},x:{grid:{display:false}}}}});
}

// ===== 模試 =====
window.addMoshi=()=>{
  const d=gd(); d.moshiCount=(d.moshiCount||0)+1;
  d.moshiData.push({id:d.moshiCount,name:`模試${d.moshiCount}`,
    total:{score:'',rank:'',totalCount:'',hensa:''},
    kokugo:{score:'',rank:'',total:'',hensa:''},
    sugaku:{score:'',rank:'',total:'',hensa:''},
    eigo:  {score:'',rank:'',total:'',hensa:''}});
  renderMoshi(); buildMoshiGraphs(); scheduleAutosave();
};
window.deleteMoshi=id=>{
  if(!confirm('削除しますか？')) return;
  gd().moshiData=gd().moshiData.filter(m=>m.id!==id);
  renderMoshi(); buildMoshiGraphs(); scheduleAutosave();
};
window.updateMoshi=(id,sub,key,val)=>{
  const m=gd().moshiData.find(x=>x.id===id);
  if(m){m[sub][key]=val;buildMoshiGraphs();scheduleAutosave();}
};
window.updateMoshiName=(id,val)=>{
  const m=gd().moshiData.find(x=>x.id===id);
  if(m){m.name=val;buildMoshiGraphs();scheduleAutosave();}
};
window.toggleMoshiExpand=(id)=>{
  expandedMoshiId = expandedMoshiId===id ? null : id;
  renderMoshi();
};
let expandedMoshiId = null;

function renderMoshi(){
  const area=document.getElementById('moshi-list');
  const md=gd().moshiData||[];
  if(!md.length){area.innerHTML='<div class="empty-state">「追加」ボタンで模試を記録できます。</div>';return;}
  area.innerHTML=md.map(m=>{
    if(!m.total) m.total={score:'',rank:'',totalCount:'',hensa:''};
    const isExpanded = expandedMoshiId === m.id;

    if(!isExpanded){
      // ===== 簡易表示（折りたたみ） =====
      const sc = m.total.score!==''&&m.total.score!=null ? m.total.score : '—';
      const hs = m.total.hensa!==''&&m.total.hensa!=null ? m.total.hensa : '—';
      return `
      <div class="moshi-card moshi-card-collapsed" onclick="toggleMoshiExpand(${m.id})">
        <div class="moshi-collapsed-row">
          <div class="moshi-collapsed-name">${m.name}</div>
          <div class="moshi-collapsed-stats">
            <span class="mc-stat"><span class="mc-stat-label">総合点</span><span class="mc-stat-val">${sc}</span></span>
            <span class="mc-stat"><span class="mc-stat-label">偏差値</span><span class="mc-stat-val">${hs}</span></span>
          </div>
          <button class="btn-expand" onclick="event.stopPropagation();toggleMoshiExpand(${m.id})">詳細</button>
        </div>
      </div>`;
    }

    // ===== 詳細表示（展開） =====
    return `
    <div class="moshi-card moshi-card-expanded">
      <div class="moshi-name-row">
        <input class="moshi-name-input" value="${m.name}" oninput="updateMoshiName(${m.id},this.value)">
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm" onclick="toggleMoshiExpand(${m.id})">閉じる</button>
          <button class="btn btn-danger btn-sm" onclick="deleteMoshi(${m.id})">削除</button>
        </div>
      </div>
      <div class="moshi-total-row">
        <div class="moshi-total-label">総合点</div>
        <div class="moshi-total-fields">
          <div>
            <div class="field-label">点数</div>
            <input type="number" class="field-input" value="${m.total.score}" placeholder="—" oninput="updateMoshi(${m.id},'total','score',this.value)">
          </div>
          <div>
            <div class="field-label">偏差値</div>
            <input type="number" class="field-input" step="0.1" value="${m.total.hensa}" placeholder="—" oninput="updateMoshi(${m.id},'total','hensa',this.value)">
          </div>
          <div>
            <div class="field-label">順位</div>
            <div class="rank-row">
              <input type="number" class="field-input" value="${m.total.rank}" placeholder="—" style="width:46%" oninput="updateMoshi(${m.id},'total','rank',this.value)">
              <span class="rank-sep">/</span>
              <input type="number" class="field-input" value="${m.total.totalCount}" placeholder="全体" style="width:46%" oninput="updateMoshi(${m.id},'total','totalCount',this.value)">
            </div>
          </div>
        </div>
      </div>
      <div class="moshi-subjects">
        ${[['kokugo','国語'],['sugaku','数学'],['eigo','英語']].map(([sub,label])=>`
          <div class="moshi-subj">
            <div class="moshi-subj-label">${label}</div>
            <div class="field-label">点数</div>
            <input type="number" class="field-input" value="${m[sub].score}" placeholder="—" oninput="updateMoshi(${m.id},'${sub}','score',this.value)">
            <div class="field-label">偏差値</div>
            <input type="number" class="field-input" step="0.1" value="${m[sub].hensa}" placeholder="—" oninput="updateMoshi(${m.id},'${sub}','hensa',this.value)">
            <div class="field-label">順位</div>
            <div class="rank-row">
              <input type="number" class="field-input" value="${m[sub].rank}" placeholder="—" style="width:46%" oninput="updateMoshi(${m.id},'${sub}','rank',this.value)">
              <span class="rank-sep">/</span>
              <input type="number" class="field-input" value="${m[sub].total}" placeholder="全体" style="width:46%" oninput="updateMoshi(${m.id},'${sub}','total',this.value)">
            </div>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function buildMoshiGraphs(){
  const md=gd().moshiData||[];
  if(moshiScoreChart) moshiScoreChart.destroy();
  if(moshiHensaChart) moshiHensaChart.destroy();
  if(!md.length) return;
  const labels=md.map(m=>m.name);
  const mk=(sub,key)=>md.map(m=>m[sub][key]===''?null:parseFloat(m[sub][key]));
  const baseOpts={responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:true,position:'bottom',labels:{font:{size:11},boxWidth:12,padding:8}}},
    scales:{y:{beginAtZero:false,grid:{color:'rgba(0,0,0,0.06)'}},x:{grid:{display:false}}}};
  const ds=(label,sub,key,color,dash=[])=>({label,data:mk(sub,key),borderColor:color,backgroundColor:'transparent',pointBackgroundColor:color,borderWidth:2.5,tension:0.3,spanGaps:false,pointRadius:4,...(dash.length?{borderDash:dash}:{})});
  moshiScoreChart=new Chart(document.getElementById('moshiScoreChart'),{type:'line',data:{labels,datasets:[ds('総合','total','score','#2c3e50',[1,2]),ds('国語','kokugo','score','#D85A30'),ds('数学','sugaku','score','#4a3fd4',[5,4]),ds('英語','eigo','score','#1D9E75',[2,3])]},options:{...baseOpts}});
  moshiHensaChart=new Chart(document.getElementById('moshiHensaChart'),{type:'line',data:{labels,datasets:[ds('総合','total','hensa','#2c3e50',[1,2]),ds('国語','kokugo','hensa','#D85A30'),ds('数学','sugaku','hensa','#4a3fd4',[5,4]),ds('英語','eigo','hensa','#1D9E75',[2,3])]},options:{...baseOpts}});
}
</script>

<style>
:root{
  --bg:#f7f6f3;--surface:#fff;--surface2:#f0efe9;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);

  --accent:#4a3fd4;--accent-light:#eeedfb;
  --r1:#fde8e8;--r1t:#9b2424;
  --r4:#fef3de;--r4t:#7a4a08;
  --r6:#e8f5df;--r6t:#2e5e0e;
  --r8:#ddf4ec;--r8t:#0d5e3f;
  --r10:#eeedfb;--r10t:#3029a0;
  --radius:10px;--radius-sm:6px;

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px}

.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 28px;text-align:center;max-width:320px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,0.08)}
.login-card h1{font-size:20px;font-weight:700;margin-bottom:8px}
.login-card p{font-size:13px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.btn-google{display:flex;align-items:center;gap:10px;padding:12px 20px;border:1.5px solid var(--border2);border-radius:8px;background:var(--surface);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;width:100%;justify-content:center}
.btn-google:active{opacity:.7}

/* アプリ骨格 */
.app{display:none;flex-direction:column;height:100vh;overflow:hidden}
.topbar{display:flex;align-items:center;gap:6px;padding:0 12px;height:var(--topbar-h);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}

.grade-tabs{display:flex;gap:4px;flex-shrink:0}

.grade-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.user-info{display:flex;align-items:center;gap:5px}
#user-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--border2)}
#user-name{font-size:11px;color:var(--text2);max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.btn:active{opacity:.7}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-danger{color:#c0392b;border-color:#e9b0af}
.btn-sm{padding:4px 10px;font-size:11px}

.tabs{display:flex;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;height:var(--tabs-h)}
.tab{display:flex;align-items:center;padding:0 18px;font-size:13px;color:var(--text2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px}
.section{display:none}.section.active{display:block}

/* サマリ */
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.metric-label{font-size:10px;color:var(--text3);margin-bottom:2px}

/* 考査ピル */
.exam-pills{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.exam-pill{padding:5px 14px;font-size:12px;font-weight:500;border:1.5px solid var(--border2);border-radius:99px;background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap}
.exam-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* テーブルオプション行 */
.table-opts{display:flex;align-items:center;gap:8px;margin-bottom:8px}

/* テーブル */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)}
table{border-collapse:collapse;white-space:nowrap;width:100%}
th,td{padding:7px 7px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);font-size:12px;text-align:center}
th:last-child,td:last-child{border-right:none}

th{background:var(--surface2);color:var(--text2);font-weight:600;font-size:11px}
td.sticky-col{position:sticky;left:0;z-index:1;text-align:left;font-weight:600;font-size:11px;min-width:100px;max-width:100px;white-space:normal;word-break:break-all;line-height:1.4;background:var(--surface)}
td.sticky-col.kokugo{background:#fde8e8;color:#8b1a1a}
td.sticky-col.sugaku{background:#ddf4fb;color:#0a5a7a}
td.sticky-col.eigo{background:#fde8f4;color:#8b1a5a}
td.sticky-col.rika{background:#e8f5df;color:#2e5e0e}
td.sticky-col.shakai{background:#f3ead8;color:#6b4210}
td.sticky-col.other{background:var(--surface2);color:var(--text)}
th:first-child{position:sticky;left:0;z-index:3;background:var(--surface2)}
td.na{background:#f5f5f3;color:var(--text3)}
td.score-cell{background:#fde8e8}
td.goal-cell{background:#eaf6ee}
td.top-cell{background:#fef9e8}
td input[type=number]{width:48px;border:none;background:transparent;text-align:center;font-size:12px;color:var(--text);outline:none;font-family:inherit;-moz-appearance:textfield}
td input[type=number]::-webkit-inner-spin-button,td input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
td input[type=number]:focus{background:var(--accent-light);border-radius:4px}
td.score-cell input{color:#8b1a1a;font-weight:600}
td.goal-cell input{color:#1a6b38;font-weight:600}
td.top-cell input{color:#7a5800;font-weight:600}
td.rank-cell input{width:30px}

td.r10{background:var(--r10);color:var(--r10t);font-weight:700}
td.diff-pos{color:#0d5e3f;font-weight:600}
td.diff-neg{color:#9b2424;font-weight:600}
.rank-sep{color:var(--text3);font-size:11px;margin:0 1px}
.note{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.6}

/* グラフパネル */
.graph-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-top:12px}
.graph-panel-title{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:10px}
.graph-mode-btns{display:flex;gap:6px;margin-bottom:10px}
.graph-mode-btn{padding:4px 12px;font-size:12px;border:1.5px solid var(--border2);border-radius:99px;background:var(--surface);color:var(--text2);cursor:pointer}
.graph-mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.graph-sub-ctrl{display:none;align-items:center;gap:8px;margin-bottom:8px}
.graph-sub-ctrl label{font-size:12px;color:var(--text2)}
.graph-sub-ctrl select{font-size:12px;padding:4px 8px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text)}
.chart-wrap{position:relative;width:100%;height:200px}
.chart-sub-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px}
.chart-block-sm{background:var(--surface2);border-radius:8px;padding:10px}
.chart-block-sm-title{font-size:11px;color:var(--text2);font-weight:600;margin-bottom:6px}

/* 模試 */
.moshi-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.moshi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.moshi-card-collapsed{padding:0;cursor:pointer}
.moshi-collapsed-row{display:flex;align-items:center;gap:10px;padding:10px 12px}
.moshi-collapsed-name{font-size:13px;font-weight:600;flex-shrink:0;min-width:60px}
.moshi-collapsed-stats{display:flex;gap:14px;flex:1}
.mc-stat{display:flex;flex-direction:column;align-items:center}
.mc-stat-label{font-size:9px;color:var(--text3)}
.mc-stat-val{font-size:14px;font-weight:700;color:var(--accent)}
.btn-expand{padding:5px 12px;font-size:11px;border:1px solid var(--border2);border-radius:99px;background:var(--surface2);color:var(--text2);cursor:pointer;flex-shrink:0}
.moshi-card-expanded{}
.moshi-name-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.moshi-name-input{font-size:14px;font-weight:600;border:none;background:transparent;color:var(--text);border-bottom:1px solid var(--border2);width:130px;font-family:inherit;outline:none}
.moshi-subjects{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.moshi-total-row{background:var(--accent-light);border-radius:8px;padding:10px;margin-bottom:10px}
.moshi-total-label{font-size:11px;font-weight:700;color:var(--accent);margin-bottom:6px;padding-bottom:3px;border-bottom:2px solid rgba(74,63,212,0.2)}
.moshi-total-fields{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.moshi-subj-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;padding-bottom:3px;border-bottom:2px solid var(--border)}
.field-label{font-size:10px;color:var(--text3);margin-bottom:2px}
.field-input{width:100%;border:1px solid var(--border);border-radius:5px;padding:4px 6px;font-size:12px;background:var(--bg);color:var(--text);font-family:inherit;margin-bottom:5px;-moz-appearance:textfield}
.field-input::-webkit-inner-spin-button{-webkit-appearance:none}
.field-input:focus{outline:none;border-color:var(--accent);background:var(--accent-light)}
.rank-row{display:flex;align-items:center;gap:3px}
.rank-row .field-input{margin-bottom:0}
.rank-sep{font-size:11px;color:var(--text3)}
.empty-state{text-align:center;padding:36px 20px;color:var(--text3);font-size:13px}
.moshi-graphs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}

/* スマホ対応 */
@media(max-width:600px){
  .topbar h1{font-size:13px}
  #user-name{display:none}
  .moshi-subjects{grid-template-columns:1fr}
  .moshi-graphs{grid-template-columns:1fr}
  .summary{gap:6px}
  .metric-value{font-size:17px}
  td input[type=number]{width:42px}
  td.rank-cell input{width:26px}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h1>📊 成績管理</h1>
    <p>Googleアカウントでログインするとデータがクラウドに保存されます。</p>
    <button class="btn-google" onclick="_login()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
      Googleでログイン
    </button>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <h1>📊 成績管理</h1>
    <div class="grade-tabs" id="grade-tabs"></div>
    <div class="topbar-right">
      <span class="save-status" id="save-status">読み込み中...</span>
      <div class="user-info">
        <img id="user-avatar" src="" alt="">
        <span id="user-name"></span>
      </div>
      <button class="btn btn-sm" onclick="_logout()">ログアウト</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('teiki')">定期考査</div>
    <div class="tab" onclick="switchTab('moshi')">模試</div>
  </div>

  <div class="content">

    <!-- 定期考査 -->
    <div id="sec-teiki" class="section active">
      <div class="summary" id="summary"></div>
      <div class="exam-pills" id="exam-pills"></div>
      <div class="table-opts">
        <button class="btn btn-sm" id="btn-top-toggle" onclick="toggleTopScore()">学年最高点を表示</button>
      </div>
      <div class="table-wrap">
        <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
      </div>
      <p class="note">※ 評定は得点率×9+1（1〜10）。差＝自分−平均。目標差＝自分−目標。合計評定は手入力。</p>

      <div class="graph-panel">
        <div class="graph-panel-title">📈 推移グラフ</div>
        <div class="graph-mode-btns">
          <button class="graph-mode-btn active" data-mode="total" onclick="switchGraphMode('total')">合計点</button>
          <button class="graph-mode-btn" data-mode="sub" onclick="switchGraphMode('sub')">科目別</button>
        </div>
        <div class="graph-sub-ctrl" id="graph-sub-ctrl">
          <label>科目：</label>
          <select id="graph-sub-sel" onchange="onSubjectChange()"></select>
        </div>
        <div id="teiki-graph-total">
          <div class="chart-wrap"><canvas id="teikiAllChart"></canvas></div>
        </div>
        <div id="teiki-graph-sub" style="display:none">
          <div class="chart-sub-grid">
            <div class="chart-block-sm">
              <div class="chart-block-sm-title">平均点との差</div>
              <div class="chart-wrap-sm"><canvas id="teikiSubChart"></canvas></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 模試 -->
    <div id="sec-moshi" class="section">
      <div class="moshi-header">
        <span style="font-size:15px;font-weight:600">模試記録</span>
        <button class="btn btn-primary" onclick="addMoshi()">＋ 追加</button>
      </div>
      <div id="moshi-list"></div>
      <div class="moshi-graphs">
        <div class="graph-panel" style="margin-top:0">
          <div class="graph-panel-title">📈 点数推移</div>
          <div class="chart-wrap"><canvas id="moshiScoreChart"></canvas></div>
        </div>
        <div class="graph-panel" style="margin-top:0">
          <div class="graph-panel-title">📊 偏差値推移</div>
          <div class="chart-wrap"><canvas id="moshiHensaChart"></canvas></div>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
